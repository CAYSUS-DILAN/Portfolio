<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caysus Dilan Rodrigues</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            transition: background 0.5s ease;
            position: relative;
        }

        #card {
            width: 320px;
            border-radius: 20px;
            box-shadow: 0 16px 40px rgba(0,0,0,0.25);
            padding: 20px 24px 16px;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .hanging-hook {
            position: absolute;
            top: -36px;
            left: 50%;
            transform: translateX(-50%);
            width: 16px;
            height: 8px;
            border: 2px solid #888;
            border-bottom: none;
            border-radius: 8px 8px 0 0;
        }
        .hanging-string {
            position: absolute;
            top: -34px;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 34px;
            background: linear-gradient(to bottom, #888, transparent);
        }

        .hanging-card {
            animation: sway 4s ease-in-out infinite;
            transform-origin: top center;
        }
        @keyframes sway {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(0.8deg); }
            75% { transform: rotate(-0.8deg); }
        }

        .profile-circle {
            width: 76px;
            height: 76px;
            border: 3px solid #e879f9;
            border-radius: 50%;
            overflow: hidden;
            margin: 0 auto 10px;
            background: white;
        }
        .profile-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        #header      { font-size: 19px; font-weight: 700; letter-spacing: -0.3px; margin-bottom: 12px; }
        #greeting    { font-size: 16px; margin-bottom: 8px; }
        #description { font-size: 13px; line-height: 1.5; margin-bottom: 6px; }
        #quote       { font-size: 12px; font-style: italic; line-height: 1.5; margin-bottom: 10px; }

        .company-highlight {
            border-radius: 10px;
            padding: 8px 12px;
            margin-bottom: 8px;
            transition: transform 0.2s ease;
            cursor: pointer;
        }
        .company-highlight:hover { transform: translateY(-2px); }
        .company-highlight p { font-size: 13px; margin: 0; }

        .email-box {
            border-radius: 10px;
            padding: 8px 12px;
            margin-bottom: 10px;
            font-family: monospace;
            font-size: 13px;
            transition: transform 0.2s ease;
            cursor: pointer;
        }
        .email-box:hover { transform: translateY(-2px); }

        .social-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
        }

        .social-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease;
            text-decoration: none;
        }
        .social-icon:hover { transform: scale(1.1); }

        .tooltip { position: relative; display: inline-block; }
        .tooltip .tooltiptext {
            visibility: hidden;
            width: 70px;
            background: #333;
            color: #fff;
            text-align: center;
            border-radius: 6px;
            padding: 4px 0;
            position: absolute;
            z-index: 10;
            bottom: 115%;
            left: 50%;
            margin-left: -35px;
            opacity: 0;
            transition: opacity 0.3s;
            font-size: 11px;
            font-family: sans-serif;
        }
        .tooltip:hover .tooltiptext { visibility: visible; opacity: 1; }

        .color-bar { height: 3px; border-radius: 2px; display: flex; }
        .color-segment { flex: 1; }

        .footer {
            margin-top: 8px;
            font-size: 12px;
            position: relative;
            z-index: 1;
        }

        #background-effects {
            position: fixed;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
            z-index: 0;
        }

        .leaf, .snowflake, .star, .moon, .sun {
            position: absolute;
            user-select: none;
            pointer-events: none;
        }
        .leaf { color: #4CAF50; }
        .snowflake { color: #fff; }
        .star { background: white; border-radius: 50%; }
        .moon, .sun { border-radius: 50%; transition: top 2s ease, left 1s ease; }
        .sun {
            background: radial-gradient(circle at center, #FFD700, #FF4500);
            box-shadow: 0 0 40px #FF4500;
        }
    </style>
</head>
<body>
    <div id="background-effects"></div>

    <div id="card" class="hanging-card">
        <div class="hanging-hook"></div>
        <div class="hanging-string"></div>

        <h1 id="header">Caysus Dilan Rodrigues</h1>

        <div class="profile-circle">
            <img src="images/me.png" alt="Caysus Rodrigues">
        </div>

        <p id="greeting">Hi 👋</p>
        <p id="description">I'm caysus. Engineering and cloud computing are my things.</p>
        <p id="quote">a friend once told me it was ridiculous to have a personal website. i agree.</p>

        <div class="company-highlight" id="company-highlight">
            <p>Junior Engineer @ <span id="company-name" style="font-weight:600;">
                <a href="https://avancerpi.com/" style="color:inherit;text-decoration:none;" target="_blank">AvancerPI Solutions</a>
            </span></p>
        </div>

        <div class="email-box" id="email-box">
            <a href="mailto:caysusdilanrodrigues@gmail.com" style="display:flex;align-items:center;justify-content:center;gap:6px;text-decoration:none;color:inherit;">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                    <polyline points="22,6 12,13 2,6"></polyline>
                </svg>
                say hello!
            </a>
        </div>

        <div class="social-row">
            <div class="tooltip">
                <a href="https://www.linkedin.com/in/caysus-dilan-rodrigues-913222319/" target="_blank" class="social-icon" style="background:#0A66C2;">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                        <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/>
                        <rect x="2" y="9" width="4" height="12"></rect>
                        <circle cx="4" cy="4" r="2"></circle>
                    </svg>
                </a>
                <span class="tooltiptext">LinkedIn</span>
            </div>
            <div class="tooltip">
                <a href="https://github.com/CAYSUS-DILAN" target="_blank" class="social-icon" style="background:#333;">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                        <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/>
                    </svg>
                </a>
                <span class="tooltiptext">GitHub</span>
            </div>
            <div class="tooltip">
                <a href="resume/Caysus Dilan - Cloud,Devops.pdf" class="social-icon" style="background:#d35400;" target="_blank">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14,2 14,8 20,8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                        <polyline points="10,9 9,9 8,9"></polyline>
                    </svg>
                </a>
                <span class="tooltiptext">Resume</span>
            </div>
        </div>

        <div class="color-bar">
            <div class="color-segment" style="background:#22c55e;"></div>
            <div class="color-segment" style="background:#3b82f6;"></div>
            <div class="color-segment" style="background:#ec4899;"></div>
            <div class="color-segment" style="background:#3b82f6;"></div>
            <div class="color-segment" style="background:#f59e0b;"></div>
            <div class="color-segment" style="background:#8b5cf6;"></div>
        </div>
    </div>

    <div class="footer" id="footer-text">Made on Earth with ❤️</div>

    <script>
        function applyTheme(theme) {
            const isDay = theme === 'day';
            const card  = document.getElementById('card');
            const bg    = document.getElementById('background-effects');

            document.body.style.background = isDay
                ? 'linear-gradient(135deg, #87CEEB 0%, #E0F7FA 100%)'
                : 'linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%)';

            card.style.background = isDay ? '#f8fafc' : '#1f2937';
            card.style.color      = isDay ? '#1f2937' : '#fff';

            document.getElementById('header').style.color      = isDay ? '#1e293b' : '#fff';
            document.getElementById('greeting').style.color    = isDay ? '#475569' : '#d1d5db';
            document.getElementById('description').style.color = isDay ? '#64748b' : '#9ca3af';
            document.getElementById('quote').style.color       = isDay ? '#64748b' : '#9ca3af';

            document.getElementById('company-highlight').style.background = isDay
                ? 'linear-gradient(135deg, #fce7f3 0%, #f3e8ff 100%)'
                : 'linear-gradient(135deg, #4c3f6d 0%, #3a2f5a 100%)';
            document.getElementById('company-name').style.color = isDay ? '#a855f7' : '#d1d5db';

            document.getElementById('email-box').style.background = isDay ? '#e2e8f0' : '#374151';
            document.getElementById('email-box').style.color      = isDay ? '#334155' : '#d1d5db';

            document.getElementById('footer-text').style.color = isDay ? '#666' : '#fff';

            const dayC   = ['#22c55e','#3b82f6','#ec4899','#3b82f6','#f59e0b','#8b5cf6'];
            const nightC = ['#22c55e','#60a5fa','#ec4899','#60a5fa','#f59e0b','#a855f7'];
            document.querySelectorAll('.color-segment').forEach((s, i) =>
                s.style.background = isDay ? dayC[i] : nightC[i]);

            bg.innerHTML = '';

            if (isDay) {
                const sun = document.createElement('div');
                sun.className = 'sun';
                sun.style.cssText = 'width:70px;height:70px;top:20px;';
                sun.style.left = (window.innerWidth - 110) + 'px';
                bg.appendChild(sun);
                requestAnimationFrame(() => {
                    const r = card.getBoundingClientRect();
                    sun.style.left = Math.min(r.right + 50, window.innerWidth - 80) + 'px';
                    sun.style.top  = Math.max(20, r.top - 100) + 'px';
                });

                if (!document.getElementById('leaf-style')) {
                    const s = document.createElement('style');
                    s.id = 'leaf-style';
                    s.innerHTML = `@keyframes fall{0%{transform:translateY(-10px) rotate(0deg)}100%{transform:translateY(100vh) rotate(360deg)}}.leaf{animation:fall linear infinite;}`;
                    document.head.appendChild(s);
                }
                for (let i = 0; i < 15; i++) {
                    const l = document.createElement('div');
                    l.className = 'leaf';
                    l.innerHTML = '🍃';
                    l.style.cssText = `left:${Math.random()*100}vw;top:-10px;opacity:${Math.random()};font-size:${Math.random()*14+8}px;animation-duration:${Math.random()*3+2}s;animation-delay:${Math.random()*3}s;`;
                    bg.appendChild(l);
                }
            } else {
                const moon = document.createElement('div');
                moon.className = 'moon';
                moon.style.cssText = 'width:50px;height:50px;top:20px;background:#f5f3ce;box-shadow:0 0 30px #f5f3ce;';
                moon.style.left = (window.innerWidth - 100) + 'px';
                bg.appendChild(moon);
                requestAnimationFrame(() => {
                    const r = card.getBoundingClientRect();
                    moon.style.left = Math.min(r.right + 50, window.innerWidth - 60) + 'px';
                    moon.style.top  = Math.max(20, r.top - 100) + 'px';
                });

                for (let i = 0; i < 100; i++) {
                    const s = document.createElement('div');
                    s.className = 'star';
                    const sz = (Math.random() * 2 + 1) + 'px';
                    s.style.cssText = `width:${sz};height:${sz};left:${Math.random()*100}vw;top:${Math.random()*100}vh;`;
                    bg.appendChild(s);
                }

                if (!document.getElementById('snow-style')) {
                    const s = document.createElement('style');
                    s.id = 'snow-style';
                    s.innerHTML = `@keyframes snow{0%{transform:translateY(-10px)}100%{transform:translateY(100vh)}}.snowflake{animation:snow linear infinite;}`;
                    document.head.appendChild(s);
                }
                for (let i = 0; i < 40; i++) {
                    const sf = document.createElement('div');
                    sf.className = 'snowflake';
                    sf.innerHTML = '❄';
                    sf.style.cssText = `left:${Math.random()*100}vw;top:-10px;opacity:${Math.random()};font-size:${Math.random()*8+4}px;animation-duration:${Math.random()*3+2}s;animation-delay:${Math.random()*3}s;`;
                    bg.appendChild(sf);
                }
            }
        }

        function updateTheme() {
            const h = new Date().getHours();
            applyTheme(h > 6 && h < 18 ? 'day' : 'night');
        }

        window.addEventListener('resize', updateTheme);
        document.addEventListener('DOMContentLoaded', updateTheme);
    </script>
</body>
</html>
